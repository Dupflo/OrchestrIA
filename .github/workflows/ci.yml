name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Report-only for now: the codebase carries pre-existing lint debt
      # (React-hooks purity/refs, declaration-merging). Tracked separately;
      # flip to a hard gate once that backlog is cleared.
      - name: Lint (report-only)
        run: npm run lint
        continue-on-error: true

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
